<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Synapse OS | Patient Guidelines</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 40px; background: var(--bg-body); }
        .guideline-container { max-width: 800px; margin: 0 auto; }
        .disease-box { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-left: 6px solid var(--warning); }
        
        /* --- নতুন যোগ করা স্টাইল (প্যারামিটার গ্রিড) --- */
        .patient-profile-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid var(--glass-border); }
        .profile-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .param-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .param-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #e2e8f0; padding-bottom: 5px; font-size: 0.85rem; }
        .param-label { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
        .param-val { color: var(--text-main); font-weight: 800; }
    </style>
</head>
<body>

    <div class="guideline-container">
        <h1 style="color: var(--text-main); margin-bottom: 5px;"><img src="logo.png" alt="Synapse Logo" class="sidebar-logo-img"> Clinical Precautions & Guidelines</h1>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Based on your recent Synapse AI Assessment.</p>

        <div id="patient-data-summary"></div>

        <div id="guidelines-area">
            </div>
    </div>

<script>
    const patientVitals = JSON.parse(localStorage.getItem('patientVitals') || '{}');
    const aiResult = JSON.parse(localStorage.getItem('aiResult') || 'null');
    const patientAge = localStorage.getItem('patientAge') || "Not Provided";
    const patientGender = localStorage.getItem('patientGender') || "Not Provided";
    const guidelineArea = document.getElementById('guidelines-area');

    // লোকাল ডক্টর ডাটাবেস (ফ্রন্টএন্ডের জন্য)
    const doctorsDB = {
        cardio: "১. প্রফেসর ডা. অমল কুমার চৌধুরী (ন্যাশনাল হার্ট ফাউন্ডেশন, মিরপুর। সিরিয়ালের জন্য: 01711-XXXXXX)\n২. ডা. এ.পি.এম সোহরাবুজ্জামান (ইব্রাহিম কার্ডিয়াক, শাহবাগ। সিরিয়ালের জন্য: 01819-XXXXXX)",
        renal: "১. প্রফেসর ডা. হারুন অর রশিদ (কিডনি ফাউন্ডেশন, মিরপুর। সিরিয়ালের জন্য: 01712-XXXXXX)\n২. ডা. এম. এ. সামাদ (পপুলার ডায়াগনস্টিক, ধানমন্ডি। সিরিয়ালের জন্য: 01552-XXXXXX)",
        meta: "১. ডা. ইন্দ্রজিৎ প্রসাদ (বারডেম জেনারেল হাসপাতাল, শাহবাগ। সিরিয়ালের জন্য: 01713-XXXXXX)\n২. ডা. ফারিয়া আফসানা (স্কয়ার হাসপাতাল, পান্থপথ। সিরিয়ালের জন্য: 01817-XXXXXX)",
        hepatic: "১. প্রফেসর ডা. মবিন খান (ল্যাবএইড স্পেশালাইজড হাসপাতাল, ধানমন্ডি। সিরিয়ালের জন্য: 01715-XXXXXX)\n২. ডা. ফারুক আহমেদ (ইবনে সিনা, ধানমন্ডি। সিরিয়ালের জন্য: 01815-XXXXXX)",
        resp: "১. ডা. এম. এ. জলিল (জাতীয় বক্ষব্যাধি ইনস্টিটিউট, মহাখালী। সিরিয়ালের জন্য: 01716-XXXXXX)\n২. ডা. তারেক মাহমুদ (ইউনাইটেড হাসপাতাল, বসুন্ধরা। সিরিয়ালের জন্য: 01914-XXXXXX)",
        general: "১. প্রফেসর ডা. এ.বি.এম আব্দুল্লাহ (বঙ্গবন্ধু শেখ মুজিব মেডিকেল বিশ্ববিদ্যালয়। সিরিয়ালের জন্য: 01714-XXXXXX)\n২. ডা. তারেক রেজা (এভারকেয়ার হাসপাতাল, বসুন্ধরা। সিরিয়ালের জন্য: 01818-XXXXXX)"
    };

    function getSuggestedDoctors(disease) {
        let docCat = "general";
        let dLower = disease.toLowerCase();
        if(dLower.includes('heart') || dLower.includes('cardio') || dLower.includes('stroke') || dLower.includes('hypertension') || dLower.includes('fibrillation') || dLower.includes('myocardial')) docCat = "cardio";
        else if(dLower.includes('kidney') || dLower.includes('renal') || dLower.includes('uti')) docCat = "renal";
        else if(dLower.includes('diabet') || dLower.includes('thyroid') || dLower.includes('gout') || dLower.includes('cushing') || dLower.includes('acidosis') || dLower.includes('hyperlipidemia')) docCat = "meta";
        else if(dLower.includes('liver') || dLower.includes('hepatic') || dLower.includes('pancreatitis') || dLower.includes('cirrhosis')) docCat = "hepatic";
        else if(dLower.includes('resp') || dLower.includes('pneumonia') || dLower.includes('asthma') || dLower.includes('copd')) docCat = "resp";
        return doctorsDB[docCat];
    }

    const PARAM_LABELS = {
        'heart_rate': 'Heart Rate', 'bp_systolic': 'Systolic BP', 'bp_diastolic': 'Diastolic BP',
        'temperature': 'Temp', 'glucose': 'Glucose', 'wbc_count': 'WBC', 'creatinine': 'Creatinine',
        'hemoglobin': 'Hemoglobin', 'platelets': 'Platelets', 'sgpt': 'SGPT', 'sao2': 'SpO2'
    };

    function formatClinicalText(rawText) {
        let formatted = rawText;
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong style="color: var(--primary); font-size: 1.05rem;">$1</strong>');
        formatted = formatted.replace(/^\*\s*(.*?)$/gm, '<li style="margin-bottom: 8px; margin-left: 20px;">$1</li>');
        formatted = formatted.replace(/\n/g, '<br>');
        formatted = formatted.replace(/(<br>\s*){3,}/g, '<br><br>');
        return `<div style="font-size: 0.95rem; line-height: 1.7; color: var(--text-main);">${formatted}</div>`;
    }

    function renderPatientData() {
        const summaryDiv = document.getElementById('patient-data-summary');
        if (Object.keys(patientVitals).length === 0) return;
        let html = `<div class="patient-profile-box animate-slide-up"><div class="profile-header"><h3 style="margin: 0; font-size: 1rem; color: var(--primary);"><i class="ri-user-heart-line"></i> Patient Clinical Profile</h3><span style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Age: <strong style="color: var(--text-main);">${patientAge}</strong> | Gender: <strong style="color: var(--text-main);">${patientGender}</strong></span></div><div class="param-grid">`;
        for (const [key, value] of Object.entries(patientVitals)) {
            let label = PARAM_LABELS[key] || key.toUpperCase();
            html += `<div class="param-item"><span class="param-label">${label}</span><span class="param-val">${value}</span></div>`;
        }
        html += `</div></div>`;
        summaryDiv.innerHTML = html;
    }

    async function renderGuidelines() {
        if (!aiResult) {
            guidelineArea.innerHTML = `<p style="color: var(--danger); text-align:center; padding: 20px;">⚠️ No clinical data found. Please run an analysis on the dashboard first.</p>`;
            return;
        }

        let primaryRisk = parseFloat(aiResult.probability) || 0;
        let combinedAlerts = [];
        
        // 🚀 FIX: এখানে আমরা aiResult.disease এবং probability ঠিকভাবে পুশ করছি
        if (primaryRisk >= 40 && aiResult.disease) {
            combinedAlerts.push({ disease: aiResult.disease, probability: aiResult.probability });
        }

        if (aiResult.secondary_alerts && aiResult.secondary_alerts.length > 0) {
            aiResult.secondary_alerts.forEach(alert => {
                combinedAlerts.push({ disease: alert.disease, probability: alert.probability });
            });
        }

        const loc = localStorage.getItem('userLoc') || 'Dhaka, Bangladesh';

        // যদি কোনো রোগ না থাকে, তাহলে সাকসেস মেসেজ দেখাবে
        if (combinedAlerts.length === 0) {
            guidelineArea.innerHTML = `<div class="disease-box" style="border-left-color: var(--success);"><h2 style="color: var(--success);"><i class="ri-checkbox-circle-line"></i> Perfect Clinical Status</h2><p>All analyzed parameters are currently within established clinical safety limits.</p></div>`;
            return;
        }

        guidelineArea.innerHTML = '';
        for (const alert of combinedAlerts) {
            const diseaseName = alert.disease.toUpperCase();
            const safeId = alert.disease.replace(/\s/g, '');

            const box = document.createElement('div');
            box.className = 'disease-box animate-pop';
            box.innerHTML = `
                <h2 style="margin:0; font-size:1.3rem; color:var(--text-main); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                    ${diseaseName} ASSESSMENT (${alert.probability})
                </h2>
                <div id="ai-banner-${safeId}" style="background: rgba(37,99,235,0.1); padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; color: var(--primary); font-weight: 800; display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--primary);">
                    <i class="ri-loader-4-line spin-icon" style="font-size: 1.2rem;"></i> Synapse Neural Engine is generating a deeper clinical analysis...
                </div>
                <div id="ai-text-${safeId}" style="color: var(--text-main); transition: opacity 0.6s ease-in-out;">
                    <!-- 🚀 FIX: এখানে আর ডামি টেক্সট প্রিন্ট হবে না, জাস্ট ফাঁকা থাকবে। অ্যানিমেশন শেষে রিয়েল টেক্সট আসবে -->
                </div>
            `;
            guidelineArea.appendChild(box);

            // ব্যাকগ্রাউন্ডে আসল এআই কল করা
            fetchRealAIGuideline(alert.disease, safeId, loc);
        }
    }

    async function fetchRealAIGuideline(disease, safeId, loc) {
        try {
            const response = await fetch('https://synapse-os-v5-0-professional-release.onrender.com/generate_guideline', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    disease: disease, vitals: patientVitals, age: patientAge, gender: patientGender, location: loc
                })
            });

            if (!response.ok) throw new Error("Server Timeout");

            const data = await response.json();
            
            if (data.status === 'success' && data.guideline && data.guideline.length > 50) { 
                const realHtml = formatClinicalText(data.guideline);
                const textBox = document.getElementById(`ai-text-${safeId}`);
                const banner = document.getElementById(`ai-banner-${safeId}`);

                textBox.style.opacity = '0';
                setTimeout(() => {
                    textBox.innerHTML = realHtml; 
                    if (banner) {
                        banner.innerHTML = `<i class="ri-check-double-line" style="color: var(--success); font-size: 1.2rem;"></i> AI Deep Analysis Complete`;
                        banner.style.background = "rgba(16, 185, 129, 0.1)";
                        banner.style.color = "var(--success)";
                        banner.style.borderLeftColor = "var(--success)";
                    }
                    textBox.style.opacity = '1';

                    setTimeout(() => { 
                        if (banner) {
                            banner.style.transition = 'opacity 0.5s';
                            banner.style.opacity = '0';
                            setTimeout(() => banner.style.display = 'none', 500);
                        }
                    }, 3000);
                }, 600);
            } else {
                throw new Error("Invalid AI response");
            }
        } catch (error) {
            console.error("AI Server Timeout - Activating fallback mode:", error);
            
            const docs = getSuggestedDoctors(disease);
            const fallbackHtml = formatClinicalText(`**অংশ ১: ক্লিনিক্যাল অ্যাসেসমেন্ট**\nআপনার বর্তমান ক্লিনিক্যাল ডেটা বিশ্লেষণ করে দেখা যাচ্ছে যে, আপনার **'${disease}'** এর ঝুঁকি রয়েছে। কিছু গুরুত্বপূর্ণ প্যারামিটার স্বাভাবিক মাত্রার বাইরে অবস্থান করছে, যা দ্রুত নিয়ন্ত্রণ করা প্রয়োজন।\n\n**অংশ ২: গাইডলাইন**\n* পর্যাপ্ত বিশ্রাম নিন এবং দৈনন্দিন জীবনে নিয়মশৃঙ্খলা বজায় রাখুন।\n* প্রক্রিয়াজাত খাবার, অতিরিক্ত লবণ ও চিনি সম্পূর্ণ এড়িয়ে চলুন।\n* প্রতিদিন অন্তত ২০ মিনিট হালকা ব্যায়াম করার চেষ্টা করুন।\n\n**অংশ ৩: চিকিৎসকের সিরিয়াল**\nআপনার অবস্থান (${loc}) অনুযায়ী নিচের বিশেষজ্ঞের পরামর্শ নিন:\n\n${docs}\n\nGenerated by Synapse-OS`);
            
            const textBox = document.getElementById(`ai-text-${safeId}`);
            const banner = document.getElementById(`ai-banner-${safeId}`);
            
            if (textBox) {
                textBox.style.opacity = '0';
                setTimeout(() => {
                    textBox.innerHTML = fallbackHtml;
                    if (banner) {
                        banner.style.transition = 'opacity 0.5s';
                        banner.style.opacity = '0';
                        setTimeout(() => banner.style.display = 'none', 500);
                    }
                    textBox.style.opacity = '1';
                }, 600);
            }
        }
    }

    window.onload = function() {
        if (!localStorage.getItem('aiResult')) {
            guidelineArea.innerHTML = `<p style="color: var(--danger); text-align:center; padding: 20px;">⚠️ No clinical data found. Go back and run AI analysis.</p>`;
        } else {
            renderPatientData();
            renderGuidelines();
        }
    };
    </script>
    
</body>
</html>
